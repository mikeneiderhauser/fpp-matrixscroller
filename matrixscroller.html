<style>
.ms-panel-sec  { display:none; }
.ms-panel-sec.active { display:block; }
.ms-mode-cols  { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
.ms-so-fields  { display:grid; grid-template-columns:8rem 1fr 90px 1fr 90px; gap:8px; align-items:end; }
.ms-section-lbl { font-size:0.78em; color:var(--bs-secondary); text-transform:uppercase; letter-spacing:0.07em; font-weight:600; margin:14px 0 6px; }
@media (max-width:768px) { .ms-mode-cols,.ms-so-fields { grid-template-columns:1fr; } }
select.form-select-sm { padding-top: 0.25rem !important; padding-bottom: 0.25rem !important; line-height: 1.5; }
</style>

<div class="container-fluid px-3 py-3" id="ms-root" style="max-width:1100px;background-color:var(--bs-body-bg);color:var(--bs-body-color);min-height:100%;transition:background-color .2s,color .2s;">

  <!-- FPP Status Bar -->
  <div class="card mb-3">
    <div class="card-body py-2 d-flex align-items-center gap-3 flex-wrap" id="ms-fpp-bar">
      <span id="ms-fpp-status" class="d-flex align-items-center gap-3 flex-wrap flex-grow-1"><span class="badge bg-secondary">Loading…</span></span>
      <button class="btn btn-sm btn-outline-secondary ms-auto" id="ms-dark-btn" onclick="toggleDark()" title="Toggle dark mode">&#9790;</button>
    </div>
    <div id="ms-meta-detail" class="d-none px-3 pb-2" style="border-top:1px solid var(--bs-border-color);"></div>
  </div>

  <!-- Panel Status -->
  <div class="card mb-3">
    <div class="card-header d-flex align-items-center justify-content-between flex-wrap gap-2">
      <strong>Panel Status</strong>
      <div class="d-flex align-items-center gap-2 flex-wrap">
        <label class="form-label form-label-sm mb-0 text-muted small" for="previewRate">Preview rate (ms)</label>
        <input type="number" id="previewRate" class="form-control form-control-sm" style="width:72px;" value="100" min="50" max="5000" step="50" onchange="updatePreviewRate()">
        <button id="btn-preview-toggle" class="btn btn-sm btn-outline-secondary" onclick="togglePreview()">&#9654; Preview</button>
        <button class="btn btn-sm btn-outline-secondary" onclick="loadStatus()">&#8635; Refresh</button>
      </div>
    </div>
    <div class="card-body">
      <div id="ms-status-grid" class="row g-2"><p class="text-muted">Loading…</p></div>
    </div>
  </div>

  <!-- Panels -->
  <div class="card mb-3">
    <div class="card-header"><strong>Panels</strong></div>
    <div class="card-body">
      <div class="d-flex align-items-center gap-2 mb-3 flex-wrap">
        <ul class="nav nav-tabs flex-grow-1 mb-0" id="ms-panel-tabs"></ul>
        <div class="d-flex gap-1 flex-shrink-0">
          <button class="btn btn-sm btn-outline-secondary" onclick="moveActivePanel(-1)" title="Move active panel left">&#8592;</button>
          <button class="btn btn-sm btn-outline-secondary" onclick="moveActivePanel(1)" title="Move active panel right">&#8594;</button>
        </div>
      </div>
      <div id="ms-panel-sections"></div>
      <div class="d-flex gap-2 mt-3 flex-wrap">
        <button class="btn btn-sm btn-outline-secondary" onclick="addPanel()">+ Add Panel</button>
        <button class="btn btn-sm btn-outline-danger" onclick="removeActivePanel()">Remove Active Panel</button>
      </div>
    </div>
  </div>

  <!-- Global Settings -->
  <div class="card mb-3">
    <div class="card-header"><strong>Global Settings</strong></div>
    <div class="card-body">
      <div class="row g-3">
        <div class="col-12 d-flex align-items-center gap-2">
          <input type="checkbox" class="form-check-input mt-0" id="g_enable_output" checked>
          <label class="form-check-label fw-semibold" for="g_enable_output">Enable Output</label>
          <span class="text-muted small">— uncheck to suppress all overlay effects while keeping the daemon running</span>
        </div>
        <div class="col-sm-6 col-md-3">
          <label class="form-label form-label-sm">FPP Host</label>
          <input type="text" id="g_fpp_host" class="form-control form-control-sm" value="localhost">
        </div>
        <div class="col-sm-6 col-md-3">
          <label class="form-label form-label-sm">Poll Interval (s)</label>
          <input type="number" id="g_poll_interval" class="form-control form-control-sm" value="1" step="0.5" min="0.5">
        </div>
        <div class="col-sm-6 col-md-3">
          <label class="form-label form-label-sm">Media Idle Timeout (s)</label>
          <input type="number" id="g_no_media_timeout" class="form-control form-control-sm" value="5" step="1" min="1">
        </div>
      </div>
    </div>
  </div>

  <!-- Daemon Control -->
  <div class="card mb-3">
    <div class="card-header d-flex align-items-center gap-2">
      <strong>Daemon Control</strong>
      <span id="daemon-status-badge"><span class="badge bg-secondary">Unknown</span></span>
    </div>
    <div class="card-body py-2 d-flex gap-2 flex-wrap align-items-center">
      <button id="btn-daemon-start"   class="btn btn-sm btn-success"        onclick="daemonStart()">&#9654; Start</button>
      <button id="btn-daemon-restart" class="btn btn-sm btn-warning"        onclick="daemonRestart()" disabled>&#8635; Restart</button>
      <button id="btn-daemon-stop"    class="btn btn-sm btn-outline-danger" onclick="daemonStop()"    disabled>&#9646; Stop</button>
    </div>
  </div>

  <div class="d-flex gap-2 mb-3">
    <button class="btn btn-primary" onclick="saveConfig()">&#128190; Save Config</button>
    <button class="btn btn-outline-secondary" onclick="loadConfig()">&#8635; Reload from Daemon</button>
  </div>

  <!-- Backup Manager -->
  <div class="card mb-3">
    <div class="card-header d-flex align-items-center justify-content-between flex-wrap gap-2">
      <strong>Backup Manager</strong>
      <div class="d-flex gap-2 flex-wrap">
        <button class="btn btn-sm btn-outline-secondary" onclick="backupConfig()">&#128190; Create Backup</button>
        <button class="btn btn-sm btn-outline-secondary" onclick="downloadConfig()">&#8659; Download Current</button>
        <label class="btn btn-sm btn-outline-secondary mb-0">&#8657; Upload &amp; Apply<input type="file" accept=".json" class="d-none" onchange="uploadConfig(this)"></label>
        <button class="btn btn-sm btn-outline-danger" onclick="deleteAllBackups()">&#128465; Delete All</button>
      </div>
    </div>
    <div class="card-body p-0">
      <div id="ms-backup-table"><p class="text-muted small p-3 mb-0">Loading…</p></div>
    </div>
  </div>

  <div class="text-end text-muted mt-2" style="font-size:0.72em;" id="ms-version"></div>

</div>

<!-- Toast -->
<div id="ms-toast" class="alert position-fixed bottom-0 end-0 m-3 d-none" role="alert" style="z-index:9999;min-width:220px;"></div>

<script>
const API = '/api/plugin/fpp-matrixscroller';
let config = { global: {}, panels: [] };
let models = [];
let fonts = [];
let musicFiles = [];
let activePanelIdx = 0;
const songOverridesLists = {};
let daemonOnline = false;

// ── Toast ─────────────────────────────────────────────────────────────────────
let _toastTimer = null;
function showToast(msg, isError = false) {
  const t = document.getElementById('ms-toast');
  t.textContent = msg;
  t.className = 'alert position-fixed bottom-0 end-0 m-3' + (isError ? ' alert-danger' : ' alert-success');
  if (_toastTimer) clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => { t.className = 'alert position-fixed bottom-0 end-0 m-3 d-none'; }, 3000);
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function escHtml(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

async function apiFetch(path, method = 'GET', body = null) {
  const opts = { method };
  if (body !== null) {
    opts.headers = { 'Content-Type': 'application/json' };
    opts.body = JSON.stringify(body);
  }
  const resp = await fetch(API + path, opts);
  if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
  return resp.json();
}

// ── FPP Status Bar ────────────────────────────────────────────────────────────
async function loadFppStatus() {
  try {
    const [s, pluginStatus] = await Promise.all([
      fetch('/api/fppd/status').then(r => r.json()),
      apiFetch('/status').catch(() => ({})),
    ]);
    let html, metaHtml = '';
    if (s.status === 1) {
      const parseMMSS = t => { const p = String(t||'0:00').split(':').map(Number); return p.length>=3 ? p[0]*3600+p[1]*60+p[2] : p[0]*60+(p[1]||0); };
      const fmtSec    = sec => `${Math.floor(sec/60)}:${String(Math.floor(sec%60)).padStart(2,'0')}`;
      const elapsed   = parseMMSS(s.time_elapsed);
      const remaining = parseMMSS(s.time_remaining);
      const total     = elapsed + remaining;
      const pct       = total > 0 ? Math.round((elapsed / total) * 100) : 0;
      const tElapsed   = escHtml(s.time_elapsed  || fmtSec(elapsed));
      const tTotal     = fmtSec(total);
      const tRemaining = escHtml(s.time_remaining || fmtSec(remaining));
      const song = escHtml(s.current_song || s.current_sequence || '—');
      html = `<span class="badge bg-success">&#9654; Playing</span>
        <span class="fw-semibold text-truncate flex-grow-1" style="max-width:360px;" title="${song}">${song}</span>
        <div class="progress flex-grow-1" style="height:6px;max-width:160px;" title="${pct}%">
          <div class="progress-bar" style="width:${pct}%"></div>
        </div>
        <span class="text-muted small text-nowrap">${tElapsed}&thinsp;/&thinsp;${tTotal}&thinsp;(${tRemaining})</span>
        <button class="btn btn-sm btn-outline-secondary py-0 px-1" style="font-size:0.7em;" onclick="document.getElementById('ms-meta-detail').classList.toggle('d-none')" title="Toggle metadata">&#9432;</button>`;
      // Use media_meta cached by the plugin daemon (ffprobe tags, more complete than status.mediameta)
      const tags = pluginStatus.media_meta || s.mediameta || {};
      const metaRows = [
        ['Title',        tags.title],
        ['Artist',       tags.artist],
        ['Album',        tags.album],
        ['Album Artist', tags.album_artist || tags.ALBUMARTIST],
        ['Genre',        tags.genre],
        ['Year',         tags.date || tags.year],
        ['Track',        tags.track],
      ].filter(([,v]) => v && String(v).trim());
      metaHtml = metaRows.length
        ? metaRows.map(([k,v]) =>
            `<span class="text-muted" style="font-size:0.78em;">${k}:</span> <span class="small">${escHtml(String(v))}</span>`
          ).join(' &ensp;·&ensp; ')
        : `<span class="text-muted small">No embedded tags found</span>`;
    } else {
      html = `<span class="badge bg-secondary">&#9632; Idle</span><span class="text-muted ms-2">No media playing</span>`;
    }
    document.getElementById('ms-fpp-status').innerHTML = html;
    const detail = document.getElementById('ms-meta-detail');
    detail.innerHTML = metaHtml;
    if (!s || s.status !== 1) detail.classList.add('d-none');
  } catch(e) {
    document.getElementById('ms-fpp-status').innerHTML = '<span class="badge bg-secondary">FPP Unreachable</span>';
  }
}

// ── Panel Status ──────────────────────────────────────────────────────────────
function updateDaemonBadge() {
  const b = document.getElementById('daemon-status-badge');
  if (!b) return;
  b.innerHTML = daemonOnline
    ? '<span class="badge bg-success">Online</span>'
    : '<span class="badge bg-danger">Offline</span>';
  ['btn-daemon-restart','btn-daemon-stop'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.disabled = !daemonOnline;
  });
  const startBtn = document.getElementById('btn-daemon-start');
  if (startBtn) startBtn.disabled = daemonOnline;
}

async function loadStatus() {
  try {
    const data = await apiFetch('/status');
    if (data.error) throw new Error(data.error);
    daemonOnline = true;
    updateDaemonBadge();
    const grid = document.getElementById('ms-status-grid');
    if (!data.panels || data.panels.length === 0) {
      grid.innerHTML = '<p class="text-muted">No panels configured.</p>';
      return;
    }
    grid.innerHTML = data.panels.map(p => {
      const badgeCls = p.mode === 'media' ? 'bg-success' : p.mode === 'no_media' ? 'bg-warning text-dark' : 'bg-secondary';
      const modeLabel = p.mode === 'media' ? 'Media Playing' : p.mode === 'no_media' ? 'Media Idle' : p.mode || 'Stopped';
      const color = p.color || '';
      const swatch = color ? `<span style="display:inline-block;width:12px;height:12px;border-radius:2px;background:${escHtml(color)};border:1px solid rgba(128,128,128,.3);flex-shrink:0;"></span>` : '';
      return `<div class="col-md-6 col-lg-4">
        <div class="card h-100">
          <div class="card-body p-2">
            <div class="d-flex align-items-center gap-2 mb-1 flex-wrap">
              ${swatch}
              <strong class="small">${escHtml(p.name||p.id)}</strong>
              <span class="badge ${badgeCls}">${modeLabel}</span>
            </div>
            <div class="text-muted" style="font-size:0.78em;">Model: ${escHtml(p.model||'—')}${(() => { const m = models.find(m => _modelName(m) === p.model); const d = m ? _modelDims(m) : ''; return d ? ` (${escHtml(d)})` : ''; })()}</div>
            <div class="small text-break mt-1">${escHtml(p.message||'(no message)')}</div>
            <div class="input-group input-group-sm mt-2">
              <input type="text" class="form-control" placeholder="Override message…" id="ov_${escHtml(p.id)}">
              <button class="btn btn-outline-secondary" onclick="sendOverride('${escHtml(p.id)}')">Send</button>
              <button class="btn btn-outline-secondary" onclick="clearOverride('${escHtml(p.id)}')">Clear</button>
            </div>
            ${p.model ? (() => {
              const collapsed = previewCollapsed.has(p.id);
              return `<div class="ms-preview-wrap mt-2" id="previewwrap_${escHtml(p.id)}" style="${previewEnabled ? '' : 'display:none;'}">
                <div class="d-flex align-items-center justify-content-between" style="cursor:pointer;" onclick="togglePanelCollapse('${escHtml(p.id)}')">
                  <span style="font-size:0.7em;text-transform:uppercase;letter-spacing:.05em;color:var(--bs-secondary);">Live Preview</span>
                  <span id="previewbtn_${escHtml(p.id)}" style="font-size:0.75em;">${collapsed ? '&#9654;' : '&#9660;'}</span>
                </div>
                <canvas id="preview_${escHtml(p.id)}" class="ms-panel-preview d-block mt-1" style="background:#111;image-rendering:pixelated;max-width:100%;${previewEnabled && !collapsed ? '' : 'display:none;'}"></canvas>
              </div>`;
            })() : ''}
          </div>
        </div>
      </div>`;
    }).join('');
    if (previewEnabled) { updatePreviewVisibility(); previewTick(); }
  } catch(e) {
    daemonOnline = false;
    updateDaemonBadge();
    document.getElementById('ms-status-grid').innerHTML = `
      <div class="col-12">
        <div class="alert alert-danger d-flex align-items-center gap-3 mb-0">
          <span>&#9888; Daemon is not running — panel status unavailable.</span>
          <button class="btn btn-sm btn-success ms-auto" onclick="daemonStart()">&#9654; Start Daemon</button>
        </div>
      </div>`;
  }
}

async function sendOverride(panelId) {
  const msg = document.getElementById('ov_' + panelId)?.value || '';
  await apiFetch('/message', 'POST', { panel_id: panelId, message: msg });
  showToast('Override sent');
}

async function clearOverride(panelId) {
  await apiFetch('/message', 'POST', { panel_id: panelId, message: null });
  showToast('Override cleared');
}

// ── Daemon Control ────────────────────────────────────────────────────────────
async function daemonStart() {
  showToast('Starting daemon…');
  try {
    const r = await apiFetch('/daemon/start');
    showToast(r.status === 'already_running' ? 'Daemon already running' : 'Daemon starting…');
  } catch(e) { showToast('Start request failed', true); }
  setTimeout(async () => {
    await loadStatus();
    if (daemonOnline) {
      await Promise.all([loadFonts(), loadMusic(), loadModels()]);
      await loadConfig();
    }
  }, 1800);
}

async function daemonStop() {
  showToast('Stopping daemon…');
  try { await apiFetch('/daemon/stop', 'POST'); } catch(e) { /* expected — socket closes */ }
  setTimeout(loadStatus, 1200);
}

async function daemonRestart() {
  showToast('Restarting daemon…');
  try { await apiFetch('/daemon/restart', 'POST'); } catch(e) { /* expected — process re-execs */ }
  setTimeout(loadStatus, 2500);
}

// ── Fonts & Music ─────────────────────────────────────────────────────────────
async function loadFonts() {
  try {
    const data = await apiFetch('/fonts');
    fonts = Array.isArray(data) ? data : [];
  } catch(e) {
    fonts = ['DejaVuSans','FreeSans','NimbusSans-Regular'];
  }
}

async function loadMusic() {
  try {
    const data = await apiFetch('/music');
    musicFiles = (data.files || []).map(f => f.name);
  } catch(e) { musicFiles = []; }
}

function fontOptions(selected) {
  return ['', ...fonts].map(f =>
    `<option value="${escHtml(f)}" ${f===(selected||'')?'selected':''}>${escHtml(f)||'-- Select Font --'}</option>`
  ).join('');
}

function musicOptions(selected) {
  const list = [...musicFiles];
  if (selected && !list.includes(selected)) list.unshift(selected);
  return ['', ...list].map(f =>
    `<option value="${escHtml(f)}" ${f===(selected||'')?'selected':''}>${escHtml(f)||'-- Select Song --'}</option>`
  ).join('');
}

// ── Models ────────────────────────────────────────────────────────────────────
async function loadModels() {
  try {
    const data = await apiFetch('/models');
    models = Array.isArray(data) ? data : [];
  } catch(e) { models = []; }
}

function _modelName(m) { return m.Name || m.name || m; }
function _modelDims(m) {
  const w = m.Width || m.width;
  if (!w) return '';
  let h;
  if (m.data) {
    // Custom-orientation models: FPP's height field is unreliable; count rows in pixel map
    h = m.data.split(';').length;
  } else {
    const chanCount   = m.ChannelCount    || m.channelCount;
    const chanPerNode = m.ChannelCountPerNode || m.channelCountPerNode || 3;
    h = chanCount ? Math.round(chanCount / chanPerNode / w) : (m.Height || m.height);
  }
  return h ? `${w} × ${h}` : `${w}`;
}

function modelOptions(selected) {
  return `<option value="">-- Select Model --</option>` +
    models.map(m => {
      const name = _modelName(m);
      const dims = _modelDims(m);
      return `<option value="${escHtml(name)}" ${name===selected?'selected':''}>${escHtml(name)}${dims ? ' ('+dims+')' : ''}</option>`;
    }).join('');
}

function updateModelDims(panelIdx) {
  const sel = document.getElementById(`p${panelIdx}_model`);
  const el  = document.getElementById(`p${panelIdx}_model_dims`);
  if (!el) return;
  const m = models.find(m => _modelName(m) === (sel?.value || ''));
  el.textContent = m ? (_modelDims(m) ? _modelDims(m) + ' px' : '') : '';
}

// ── Config ────────────────────────────────────────────────────────────────────
async function loadConfig() {
  try {
    const data = await apiFetch('/config');
    if (data.error) { showToast('Daemon offline — config not reloaded', true); return; }
    config = data;
    applyGlobalToUI();
    renderPanelTabs();
    showToast('Config loaded');
  } catch(e) { showToast('Failed to load config', true); }
}

function applyGlobalToUI() {
  const g = config.global || {};
  document.getElementById('g_enable_output').checked   = g.enable_output !== false;
  document.getElementById('g_fpp_host').value          = g.fpp_host          || 'localhost';
  document.getElementById('g_poll_interval').value     = g.poll_interval      || 1;
  document.getElementById('g_no_media_timeout').value  = g.no_media_timeout   || 5;
}

function collectGlobalFromUI() {
  return {
    enable_output:    document.getElementById('g_enable_output').checked,
    fpp_host:         document.getElementById('g_fpp_host').value.trim(),
    poll_interval:    parseFloat(document.getElementById('g_poll_interval').value)    || 1,
    no_media_timeout: parseFloat(document.getElementById('g_no_media_timeout').value) || 5,
  };
}

async function saveConfig() {
  config.global = collectGlobalFromUI();
  config.panels = collectAllPanels();
  try {
    await apiFetch('/config', 'POST', config);
    try { await apiFetch('/reload', 'POST'); } catch(e) {}
    showToast('Config saved ✓');
  } catch(e) { showToast('Save failed', true); }
}

// ── Panel rendering ───────────────────────────────────────────────────────────
const _fieldTips = {
  pre_roll:  'Prepended to the start of every message, before song info.',
  tune_to:   'Static label inserted before the song info (e.g. "Tune To:").',
  post_roll: 'Appended to the end of every message, after song info.',
  gap:       'Separator inserted between each message part (e.g. " | ").',
  artist:    'Include the song artist from embedded MP3 tags.',
  title:     'Include the song title from embedded MP3 tags.',
  album:     'Include the album name from embedded MP3 tags.',
};

function txtChk(panelIdx, modeKey, fieldKey, label) {
  const cId  = `p${panelIdx}_${modeKey}_${fieldKey}_en`;
  const tId  = `p${panelIdx}_${modeKey}_${fieldKey}_txt`;
  return `<div class="mb-2">
    <label class="form-label form-label-sm mb-1">${label}</label>
    <div class="input-group input-group-sm">
      <div class="input-group-text"><input type="checkbox" class="form-check-input mt-0" id="${cId}"></div>
      <input type="text" id="${tId}" class="form-control form-control-sm" placeholder="${label}…">
    </div>
  </div>`;
}

function chkField(panelIdx, modeKey, fieldKey, label) {
  const cId = `p${panelIdx}_${modeKey}_${fieldKey}_en`;
  const tip = _fieldTips[fieldKey] || '';
  return `<div class="d-flex align-items-center gap-2 mb-2">
    <input type="checkbox" class="form-check-input flex-shrink-0 mt-0" id="${cId}" style="width:1em;height:1em;" title="${tip}">
    <label class="mb-0" for="${cId}" title="${tip}">${label}</label>
  </div>`;
}

function renderPanel(panelIdx, pcfg) {
  const mediaFields = `
    <div class="row g-2 mb-2">
      <div class="col-6">${txtChk(panelIdx,'media','pre_roll','Pre-Roll')}</div>
      <div class="col-6">${txtChk(panelIdx,'media','tune_to','Tune To')}</div>
      <div class="col-6">${txtChk(panelIdx,'media','post_roll','Post-Roll')}</div>
      <div class="col-6">${txtChk(panelIdx,'media','gap','Gap Text')}</div>
    </div>
    <div class="ms-section-lbl">Metadata</div>
    <div class="d-flex gap-4">
      ${chkField(panelIdx,'media','artist','Artist')}
      ${chkField(panelIdx,'media','title','Title')}
      ${chkField(panelIdx,'media','album','Album')}
    </div>`;
  const noMediaFields = `
    <div class="row g-2">
      <div class="col-6">${txtChk(panelIdx,'no_media','pre_roll','Pre-Roll')}</div>
      <div class="col-6">${txtChk(panelIdx,'no_media','tune_to','Tune To')}</div>
      <div class="col-6">${txtChk(panelIdx,'no_media','post_roll','Post-Roll')}</div>
      <div class="col-6">${txtChk(panelIdx,'no_media','gap','Gap Text')}</div>
    </div>`;

  return `<div class="ms-panel-sec" id="panel-section-${panelIdx}">
    <div class="row g-3 mb-3 align-items-end">

function renderPanelTabs() {
  const tabs = document.getElementById('ms-panel-tabs');
  const secs = document.getElementById('ms-panel-sections');
  const panels = config.panels || [];
  Object.keys(songOverridesLists).forEach(k => delete songOverridesLists[k]);
  tabs.innerHTML = panels.map((p,i) =>
    `<li class="nav-item"><a class="nav-link ${i===activePanelIdx?'active':''}" href="#" onclick="switchPanel(${i});return false;">${escHtml(p.name||('Panel '+(i+1)))}</a></li>`
  ).join('');
  secs.innerHTML = panels.map((p,i) => renderPanel(i,p)).join('');
  panels.forEach((p,i) => applyPanelToUI(i,p));
  switchPanel(Math.min(activePanelIdx, panels.length-1));
}

function applyPanelToUI(idx, pcfg) {
  const get = id => document.getElementById(id);
  get(`p${idx}_enabled`).checked  = pcfg.enabled !== false;
  get(`p${idx}_name`).value       = pcfg.name    || '';
  get(`p${idx}_id`).value         = pcfg.id      || '';
  get(`p${idx}_color`).value      = pcfg.color   || '#ff0000';
  get(`p${idx}_fontsize`).value   = pcfg.fontsize || 10;
  get(`p${idx}_pps`).value        = pcfg.pixelspersecond || 15;

  const fontSel = get(`p${idx}_font`);
  if (fontSel) fontSel.value = pcfg.font || '';

  const posSel = get(`p${idx}_position`);
  if (posSel) posSel.value = pcfg.position || 'R2L';

  updateModelDims(idx);

  ['media','no_media'].forEach(mode => {
    const enEl = get(`p${idx}_${mode}_enabled`);
    if (enEl) enEl.checked = (pcfg[mode]||{}).enabled !== false;
    ['pre_roll','tune_to','post_roll','gap'].forEach(field => {
      const fCfg  = (pcfg[mode]||{})[field]||{};
      const enEl  = get(`p${idx}_${mode}_${field}_en`);
      const txtEl = get(`p${idx}_${mode}_${field}_txt`);
      if (enEl)  enEl.checked = fCfg.enabled || false;
      if (txtEl) txtEl.value  = fCfg.text    || '';
    });
  });

  const metaDef = { artist:true, title:true, album:false };
  ['artist','title','album'].forEach(field => {
    const el = get(`p${idx}_media_${field}_en`);
    if (el) el.checked = ((pcfg.media||{})[field]||{}).enabled ?? metaDef[field];
  });

  applySongOverridesToUI(idx, pcfg.song_overrides||{});
}

function collectPanel(idx) {
  const get = id => document.getElementById(id);
  const panel = {
    id:             get(`p${idx}_id`).value.trim()    || `panel_${idx+1}`,
    name:           get(`p${idx}_name`).value.trim()  || `Panel ${idx+1}`,
    enabled:        get(`p${idx}_enabled`).checked,
    model:          get(`p${idx}_model`)?.value        || '',
    color:          get(`p${idx}_color`).value.trim()  || '#ff0000',
    font:           get(`p${idx}_font`)?.value         || 'DejaVuSans',
    fontsize:       parseInt(get(`p${idx}_fontsize`).value) || 10,
    position:       get(`p${idx}_position`)?.value     || 'R2L',
    pixelspersecond:parseInt(get(`p${idx}_pps`).value) || 15,
    media:{}, no_media:{},
  };
  ['media','no_media'].forEach(mode => {
    panel[mode].enabled = get(`p${idx}_${mode}_enabled`)?.checked ?? true;
    ['pre_roll','tune_to','post_roll','gap'].forEach(field => {
      panel[mode][field] = {
        enabled: get(`p${idx}_${mode}_${field}_en`)?.checked || false,
        text:    get(`p${idx}_${mode}_${field}_txt`)?.value  || '',
      };
    });
  });
  const metaDef = { artist:true, title:true, album:false };
  ['artist','title','album'].forEach(field => {
    panel.media[field] = { enabled: get(`p${idx}_media_${field}_en`)?.checked ?? metaDef[field] };
  });
  panel.song_overrides = collectSongOverrides(idx);
  return panel;
}

function collectAllPanels() {
  return (config.panels||[]).map((_,i) => collectPanel(i));
}

function switchPanel(idx) {
  activePanelIdx = idx;
  document.querySelectorAll('#ms-panel-tabs .nav-link').forEach((t,i) => t.classList.toggle('active', i===idx));
  document.querySelectorAll('.ms-panel-sec').forEach((s,i) => s.classList.toggle('active', i===idx));
}

function addPanel() {
  const newIdx = (config.panels||[]).length;
  config.panels = collectAllPanels();
  config.panels.push({
    id:`panel_${newIdx+1}`, name:`Panel ${newIdx+1}`, enabled:true, model:'',
    color:'#ff0000', font:'DejaVuSans', fontsize:10, position:'R2L', pixelspersecond:15,
    media:{enabled:true,pre_roll:{enabled:false,text:''},tune_to:{enabled:false,text:'Tune To:'},
           artist:{enabled:true},title:{enabled:true},album:{enabled:false},
           post_roll:{enabled:false,text:''},gap:{enabled:true,text:' | '}},
    no_media:{enabled:true,pre_roll:{enabled:false,text:''},tune_to:{enabled:true,text:'Tune To:'},
              post_roll:{enabled:false,text:''},gap:{enabled:true,text:' | '}},
    song_overrides:{},
  });
  activePanelIdx = config.panels.length-1;
  renderPanelTabs();
}

function removeActivePanel() {
  if ((config.panels||[]).length <= 1) { showToast('Must have at least one panel', true); return; }
  config.panels = collectAllPanels();
  config.panels.splice(activePanelIdx, 1);
  activePanelIdx = Math.max(0, activePanelIdx-1);
  renderPanelTabs();
  showToast('Panel removed');
}

function moveActivePanel(dir) {
  config.panels = collectAllPanels();
  const panels = config.panels;
  const newIdx = activePanelIdx + dir;
  if (newIdx < 0 || newIdx >= panels.length) return;
  [panels[activePanelIdx], panels[newIdx]] = [panels[newIdx], panels[activePanelIdx]];
  activePanelIdx = newIdx;
  renderPanelTabs();
}

// ── Song overrides ────────────────────────────────────────────────────────────
function _readSongOverrideRow(panelIdx, i) {
  const pfx = `p${panelIdx}_so_${i}`;
  const fs  = parseInt(document.getElementById(`${pfx}_fontsize`)?.value);
  const pps = parseInt(document.getElementById(`${pfx}_pps`)?.value);
  return {
    key:             document.getElementById(`${pfx}_key`)?.value      || '',
    enabled:         document.getElementById(`${pfx}_enabled`)?.checked ?? true,
    color:           document.getElementById(`${pfx}_color_en`)?.checked ? (document.getElementById(`${pfx}_color`)?.value||'') : '',
    font:            document.getElementById(`${pfx}_font`)?.value      || '',
    fontsize:        isNaN(fs)  ? '' : fs,
    position:        document.getElementById(`${pfx}_position`)?.value  || '',
    pixelspersecond: isNaN(pps) ? '' : pps,
    artist:          document.getElementById(`${pfx}_artist`)?.value    || '',
    title:           document.getElementById(`${pfx}_title`)?.value     || '',
    album:           document.getElementById(`${pfx}_album`)?.value     || '',
  };
}

function directionOptions(selected, includeInherit = false) {
  const opts = includeInherit ? [['', '— inherit —']] : [];
  opts.push(
    ['R2L', 'R2L – Right to Left'],
    ['L2R', 'L2R – Left to Right'],
    ['B2T', 'B2T – Bottom to Top'],
    ['T2B', 'T2B – Top to Bottom'],
    ['center', 'Center (static)'],
  );
  return opts.map(([v,l]) => `<option value="${v}" ${v===(selected||'')?'selected':''}>${l}</option>`).join('');
}

function renderSongOverrideRow(panelIdx, i, ov) {
  const pfx = `p${panelIdx}_so_${i}`;
  const fs  = (ov.fontsize != null && ov.fontsize !== '') ? ov.fontsize : '';
  const pps = (ov.pixelspersecond != null && ov.pixelspersecond !== '') ? ov.pixelspersecond : '';

    <div class="card-body p-2">
    <div class="d-flex align-items-center gap-2 mb-2 flex-wrap">
      <div class="flex-grow-1" style="min-width:180px;">
        <label class="form-label form-label-sm mb-1">Song (MP3 filename)</label>
        <select id="${pfx}_key" class="form-select form-select-sm">${musicOptions(ov.key||'')}</select>
      </div>
      <div class="d-flex align-items-center gap-3 mt-3 flex-shrink-0">
        <div class="d-flex align-items-center gap-2">
          <input type="checkbox" class="form-check-input flex-shrink-0 mt-0" id="${pfx}_enabled" style="width:1em;height:1em;" ${ov.enabled!==false?'checked':''}>
          <label class="mb-0 small" for="${pfx}_enabled" title="Uncheck to suppress the overlay for this song">Play overlay</label>
        </div>

      </div>
    </div>
    <div class="ms-so-fields">
      <div>
        <label class="form-label form-label-sm d-flex justify-content-between align-items-center" for="${pfx}_color">
          <span>Color</span>
          <span class="d-flex align-items-center gap-1">
            <span class="text-muted" style="font-size:0.7em;">Override</span>
            <input type="checkbox" class="form-check-input mt-0" style="width:0.8em;height:0.8em;" id="${pfx}_color_en" ${ov.color?'checked':''} onchange="toggleSoColor(this,'${pfx}')">
          </span>
        </label>
        <input type="color" id="${pfx}_color" class="form-control form-control-sm form-control-color w-100" value="${escHtml(ov.color||'#ff0000')}" ${ov.color?'':'disabled'}>
      </div>
      <div>
        <label class="form-label form-label-sm">Font</label>
        <select id="${pfx}_font" class="form-select form-select-sm">${fontOptions(ov.font||'')}</select>
      </div>
      <div>
        <label class="form-label form-label-sm">Font Size</label>
        <input type="number" id="${pfx}_fontsize" class="form-control form-control-sm" placeholder="inherit" min="4" max="72" value="${fs}">
      </div>
      <div>
        <label class="form-label form-label-sm">Direction</label>
        <select id="${pfx}_position" class="form-select form-select-sm">${directionOptions(ov.position, true)}</select>
      </div>
      <div>
        <label class="form-label form-label-sm">Pixels/Sec</label>
        <input type="number" id="${pfx}_pps" class="form-control form-control-sm" placeholder="inherit" min="1" max="200" value="${pps}">
      </div>
    </div>
    <div class="row g-2 mt-2">
      <div class="col-4">
        <label class="form-label form-label-sm mb-1">Artist Override</label>
        <input type="text" id="${pfx}_artist" class="form-control form-control-sm" placeholder="use metadata" value="${escHtml(ov.artist||'')}">
      </div>
      <div class="col-4">
        <label class="form-label form-label-sm mb-1">Title Override</label>
        <input type="text" id="${pfx}_title" class="form-control form-control-sm" placeholder="use metadata" value="${escHtml(ov.title||'')}">
      </div>
      <div class="col-4">
        <label class="form-label form-label-sm mb-1">Album Override</label>
        <input type="text" id="${pfx}_album" class="form-control form-control-sm" placeholder="use metadata" value="${escHtml(ov.album||'')}">

}

function toggleSoColor(cb, pfx) {
  const picker = document.getElementById(`${pfx}_color`);
  if (picker) picker.disabled = !cb.checked;
}

function renderSongOverrides(panelIdx) {
  const container = document.getElementById(`p${panelIdx}_so_list`);
  if (!container) return;
  const list = songOverridesLists[panelIdx] || [];
  container.innerHTML = list.length === 0
    ? '<p class="text-muted small mb-2">No song overrides configured.</p>'
    : list.map((ov,i) => renderSongOverrideRow(panelIdx,i,ov)).join('');
}

function syncSongOverridesFromDOM(panelIdx) {
  const container = document.getElementById(`p${panelIdx}_so_list`);
  if (!container) return;
  const cards = container.querySelectorAll('.card');
  songOverridesLists[panelIdx] = Array.from(cards).map((_, i) => _readSongOverrideRow(panelIdx, i));
}

function addSongOverride(panelIdx) {
  syncSongOverridesFromDOM(panelIdx);
  if (!songOverridesLists[panelIdx]) songOverridesLists[panelIdx] = [];
  songOverridesLists[panelIdx].push({key:'',enabled:true,color:'',font:'',fontsize:'',position:'',pixelspersecond:'',artist:'',title:'',album:''});
  renderSongOverrides(panelIdx);
}

function removeSongOverride(panelIdx, i) {
  syncSongOverridesFromDOM(panelIdx);
  if (songOverridesLists[panelIdx]) songOverridesLists[panelIdx].splice(i,1);
  renderSongOverrides(panelIdx);
}

function applySongOverridesToUI(panelIdx, overridesDict) {
  songOverridesLists[panelIdx] = Object.entries(overridesDict||{}).map(([key,ov]) => ({key,...ov}));
  renderSongOverrides(panelIdx);
}

function collectSongOverrides(panelIdx) {
  const container = document.getElementById(`p${panelIdx}_so_list`);
  if (!container) return {};
  const result = {};
  container.querySelectorAll('.card').forEach((_, i) => {
    const row = _readSongOverrideRow(panelIdx, i);
    const key = row.key.trim();
    if (!key) return;
    const ov = { enabled: row.enabled };
    if (row.color)                              ov.color           = row.color;
    if (row.font)                               ov.font            = row.font;
    if (row.fontsize !== '' && row.fontsize > 0) ov.fontsize       = row.fontsize;
    if (row.position)                           ov.position        = row.position;
    if (row.pixelspersecond !== '' && row.pixelspersecond > 0) ov.pixelspersecond = row.pixelspersecond;
    if (row.artist) ov.artist = row.artist;
    if (row.title)  ov.title  = row.title;
    if (row.album)  ov.album  = row.album;
    result[key] = ov;
  });
  return result;
}

// ── Backup Manager ────────────────────────────────────────────────────────────
async function loadBackups() {
  const container = document.getElementById('ms-backup-table');
  if (!container) return;
  try {
    const files = await apiFetch('/backups');
    if (!Array.isArray(files) || files.length === 0) {
      container.innerHTML = '<p class="text-muted small p-3 mb-0">No backups found.</p>';
      return;
    }
    container.innerHTML = `<div class="table-responsive"><table class="table table-sm table-hover mb-0">
      <thead><tr><th>Filename</th><th class="text-end">Actions</th></tr></thead>
      <tbody>${files.map(f => `<tr>
        <td class="small align-middle">${escHtml(f)}</td>
        <td class="text-end align-middle" style="white-space:nowrap;">
          <button class="btn btn-sm btn-outline-secondary me-1" onclick="downloadBackup('${escHtml(f)}')">&#8659; Download</button>
          <button class="btn btn-sm btn-outline-warning me-1" onclick="restoreBackupFile('${escHtml(f)}')">&#8635; Restore</button>
          <button class="btn btn-sm btn-outline-danger" onclick="deleteBackup('${escHtml(f)}')">&#128465; Delete</button>
        </td>
      </tr>`).join('')}</tbody>
    </table></div>`;
  } catch(e) {
    container.innerHTML = '<p class="text-muted small p-3 mb-0">Daemon offline — backups unavailable.</p>';
  }
}

async function backupConfig() {
  try {
    const r = await apiFetch('/backup', 'POST');
    showToast('Backup saved: ' + r.filename);
    await loadBackups();
  } catch(e) { showToast('Backup failed', true); }
}

async function downloadBackup(filename) {
  try {
    const data = await apiFetch('/backup/download?filename=' + encodeURIComponent(filename));
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = filename;
    a.click();
    URL.revokeObjectURL(a.href);
  } catch(e) { showToast('Download failed', true); }
}

async function restoreBackupFile(filename) {
  try {
    await apiFetch('/restore', 'POST', { filename });
    showToast('Restored from ' + filename);
    await loadConfig();
  } catch(e) { showToast('Restore failed', true); }
}

async function deleteBackup(filename) {
  if (!confirm('Delete backup: ' + filename + '?')) return;
  try {
    await apiFetch('/backup/delete', 'POST', { filename });
    showToast('Backup deleted');
    await loadBackups();
  } catch(e) { showToast('Delete failed', true); }
}

async function deleteAllBackups() {
  if (!confirm('Delete ALL backups? This cannot be undone.')) return;
  try {
    const r = await apiFetch('/backup/delete-all', 'POST');
    showToast('Deleted ' + r.deleted + ' backup(s)');
    await loadBackups();
  } catch(e) { showToast('Delete all failed', true); }
}

function downloadConfig() {
  const blob = new Blob([JSON.stringify(config, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'plugin.fpp-matrixscroller.json';
  a.click();
  URL.revokeObjectURL(a.href);
}

function uploadConfig(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async e => {
    try {
      const cfg = JSON.parse(e.target.result);
      await apiFetch('/config', 'POST', cfg);
      config = cfg;
      applyGlobalToUI();
      renderPanelTabs();
      showToast('Config uploaded and applied');
    } catch(err) { showToast('Upload failed — invalid JSON', true); }
    input.value = '';
  };
  reader.readAsText(file);
}

// ── Dark mode ─────────────────────────────────────────────────────────────────
function toggleDark() {
  const root = document.getElementById('ms-root');
  const isDark = root.getAttribute('data-bs-theme') === 'dark';
  const next = isDark ? 'light' : 'dark';
  root.setAttribute('data-bs-theme', next);
  document.getElementById('ms-dark-btn').textContent = next === 'dark' ? '☀' : '☾';
  try { localStorage.setItem('ms-theme', next); } catch(e) {}
}

function applyStoredTheme() {
  let theme = 'light';
  try { theme = localStorage.getItem('ms-theme') || 'light'; } catch(e) {}
  const root = document.getElementById('ms-root');
  root.setAttribute('data-bs-theme', theme);
  document.getElementById('ms-dark-btn').textContent = theme === 'dark' ? '☀' : '☾';
}

async function loadVersion() {
  try {
    const r = await fetch(`${API}/version`);
    if (!r.ok) return;
    const d = await r.json();
    const el = document.getElementById('ms-version');
    if (el && d.commit) el.textContent = `fpp-matrixscroller @ ${d.commit}`;
  } catch (_) {}
}

// ── Init ──────────────────────────────────────────────────────────────────────
async function init() {
  applyStoredTheme();
  updateDaemonBadge();
  await Promise.all([loadFonts(), loadMusic(), loadModels()]);
  await loadConfig();
  await Promise.all([loadStatus(), loadBackups()]);
  await loadFppStatus();
  loadVersion();
  setInterval(loadStatus,    10000);
  setInterval(loadFppStatus,  5000);
}

init();

// ── Live Preview ──────────────────────────────────────────────────────────────
let previewEnabled  = false;
let previewTimer    = null;
let previewRateMs   = 100;
const previewCollapsed = new Set();

function togglePreview() {
  previewEnabled = !previewEnabled;
  const btn = document.getElementById('btn-preview-toggle');
  if (previewEnabled) {
    btn.innerHTML = '&#9646; Preview';
    btn.classList.replace('btn-outline-secondary', 'btn-success');
    updatePreviewVisibility();
    startPreviewTimer();
  } else {
    btn.innerHTML = '&#9654; Preview';
    btn.classList.replace('btn-success', 'btn-outline-secondary');
    stopPreviewTimer();
    document.querySelectorAll('.ms-preview-wrap').forEach(w => w.style.display = 'none');
  }
}

function togglePanelCollapse(panelId) {
  if (previewCollapsed.has(panelId)) previewCollapsed.delete(panelId);
  else previewCollapsed.add(panelId);
  updatePreviewVisibility();
  if (previewEnabled && !previewCollapsed.has(panelId)) previewTickPanel(panelId);
}

function updatePreviewVisibility() {
  (config.panels || []).forEach(p => {
    const wrap   = document.getElementById(`previewwrap_${p.id}`);
    const canvas = document.getElementById(`preview_${p.id}`);
    const btn    = document.getElementById(`previewbtn_${p.id}`);
    if (!wrap) return;
    const collapsed = previewCollapsed.has(p.id);
    wrap.style.display   = previewEnabled ? '' : 'none';
    if (canvas) canvas.style.display = (previewEnabled && !collapsed) ? 'block' : 'none';
    if (btn)    btn.innerHTML = collapsed ? '&#9654;' : '&#9660;';
  });
}

function updatePreviewRate() {
  const val = parseInt(document.getElementById('previewRate')?.value) || 100;
  previewRateMs = Math.max(50, Math.min(5000, val));
  if (previewEnabled) { stopPreviewTimer(); startPreviewTimer(); }
}

function startPreviewTimer() {
  stopPreviewTimer();
  previewTick();
  previewTimer = setInterval(previewTick, previewRateMs);
}

function stopPreviewTimer() {
  if (previewTimer) { clearInterval(previewTimer); previewTimer = null; }
}

async function previewTick() {
  if (!previewEnabled) return;
  await Promise.all((config.panels || []).map(p => previewTickPanel(p.id)));
}

const _prevModelDimsCache = {};

async function previewTickPanel(panelId) {
  const p = (config.panels || []).find(p => p.id === panelId);
  if (!p || !p.model) return;
  if (previewCollapsed.has(panelId)) return;
  const canvas = document.getElementById(`preview_${panelId}`);
  if (!canvas || canvas.style.display === 'none') return;

  // Resolve w/h: models list may lack dims for overlay-only models, so fall back to overlay API
  let {w, h} = _prevModelDimsCache[p.model] || {};
  if (!w || !h) {
    const m = models.find(m => _modelName(m) === p.model);
    if (m) {
      w = parseInt(m.Width || m.width || 0);
      const cc  = parseInt(m.ChannelCount || m.channelCount || 0);
      const cpn = parseInt(m.ChannelCountPerNode || m.channelCountPerNode || 3);
      h = w && cc ? Math.round(cc / cpn / w) : parseInt(m.Height || m.height || 0);
    }
    if (!w || !h) {
      try {
        const md = await apiFetch(`/overlays/model/${encodeURIComponent(p.model)}`);
        w = parseInt(md.width || md.Width || 0);
        const cc  = parseInt(md.ChannelCount || md.channelCount || 0);
        const cpn = parseInt(md.ChannelCountPerNode || md.channelCountPerNode || 3);
        h = w && cc ? Math.round(cc / cpn / w) : parseInt(md.height || md.Height || 0);
      } catch(e) {}
    }
    if (w && h) _prevModelDimsCache[p.model] = {w, h};
  }
  if (!w || !h) return;

  try {
    const resp = await fetch(`/api/overlays/model/${encodeURIComponent(p.model)}/data`);
    if (!resp.ok) return;
    const d = await resp.json();
    if (!Array.isArray(d.data) || d.data.length < w * h * 3) return;
    renderModelToCanvas(canvas, d.data, w, h);
  } catch(e) {}
}

const _PREV_MAX_W = 400, _PREV_MAX_H = 400;
function renderModelToCanvas(canvas, data, w, h) {
  const scale = Math.max(1, Math.floor(Math.min(_PREV_MAX_W / w, _PREV_MAX_H / h)));
  const cw = w * scale, ch = h * scale;
  if (canvas.width !== cw || canvas.height !== ch) { canvas.width = cw; canvas.height = ch; }
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#111';
  ctx.fillRect(0, 0, cw, ch);
  for (let row = 0; row < h; row++) {
    for (let col = 0; col < w; col++) {
      const i = (row * w + col) * 3;
      const r = data[i], g = data[i+1], b = data[i+2];
      if (r || g || b) {
        ctx.fillStyle = `rgb(${r},${g},${b})`;
        ctx.fillRect(col * scale, row * scale, scale, scale);
      }
    }
  }
}
</script>
