# ── matrixscroller_secrets.yaml ──────────────────────────────────────────────
# Add these entries to your Home Assistant secrets.yaml.
# Change YOUR_FPP_IP to your FPP device IP — this is the ONLY place you
# need to update when your FPP IP changes.
# ─────────────────────────────────────────────────────────────────────────────

matrixscroller_api_status:      http://YOUR_FPP_IP/api/plugin/fpp-matrixscroller/status
matrixscroller_api_config:      http://YOUR_FPP_IP/api/plugin/fpp-matrixscroller/config
matrixscroller_api_output:      http://YOUR_FPP_IP/api/plugin/fpp-matrixscroller/output
matrixscroller_api_message:     http://YOUR_FPP_IP/api/plugin/fpp-matrixscroller/message
matrixscroller_api_message_all: http://YOUR_FPP_IP/api/plugin/fpp-matrixscroller/message/all
matrixscroller_plugin_ui:       http://YOUR_FPP_IP/plugin/fpp-matrixscroller/matrixscroller.html
