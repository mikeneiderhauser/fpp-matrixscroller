<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Matrix Scroller</title>
<style>
  body { font-family: Arial, sans-serif; margin: 0; padding: 0; background: #1a1a2e; color: #eee; }
  .container { max-width: 1100px; margin: 0 auto; padding: 20px; }
  h1 { color: #e94560; margin-bottom: 4px; }
  .subtitle { color: #aaa; margin-bottom: 24px; font-size: 0.9em; }
  .card { background: #16213e; border-radius: 8px; padding: 20px; margin-bottom: 20px; border: 1px solid #0f3460; }
  .card h2 { margin-top: 0; color: #e94560; font-size: 1.1em; border-bottom: 1px solid #0f3460; padding-bottom: 8px; }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .field { display: flex; flex-direction: column; gap: 4px; }
  .field label { font-size: 0.82em; color: #aaa; text-transform: uppercase; letter-spacing: 0.05em; }
  input[type=text], input[type=number], select {
    background: #0f3460; border: 1px solid #2a4a7f; color: #eee;
    padding: 7px 10px; border-radius: 4px; font-size: 0.95em; width: 100%; box-sizing: border-box;
  }
  input[type=text]:focus, input[type=number]:focus, select:focus { outline: none; border-color: #e94560; }
  .checkbox-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .checkbox-row input[type=checkbox] { width: 16px; height: 16px; cursor: pointer; accent-color: #e94560; }
  .checkbox-row label { font-size: 0.9em; cursor: pointer; }
  .text-field-row { display: flex; gap: 8px; align-items: center; }
  .text-field-row input[type=checkbox] { flex-shrink: 0; width: 16px; height: 16px; accent-color: #e94560; cursor: pointer; }
  .text-field-row input[type=text] { flex: 1; }
  .section-label { font-size: 0.8em; color: #e94560; text-transform: uppercase; letter-spacing: 0.08em; margin: 14px 0 8px; font-weight: bold; }
  .mode-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .mode-col { background: #0d1b35; border-radius: 6px; padding: 14px; border: 1px solid #0f3460; }
  .mode-col-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid #1a3060; }
  .mode-col-header input[type=checkbox] { width: 18px; height: 18px; accent-color: #e94560; cursor: pointer; flex-shrink: 0; }
  .mode-col-header label { font-weight: bold; font-size: 0.95em; cursor: pointer; }
  .btn { padding: 9px 20px; border: none; border-radius: 4px; cursor: pointer; font-size: 0.95em; font-weight: bold; }
  .btn-primary { background: #e94560; color: #fff; }
  .btn-primary:hover { background: #c73652; }
  .btn-secondary { background: #0f3460; color: #eee; border: 1px solid #2a4a7f; }
  .btn-secondary:hover { background: #1a4a80; }
  .btn-danger { background: #7f1d1d; color: #fca5a5; border: 1px solid #b91c1c; }
  .btn-danger:hover { background: #b91c1c; color: #fff; }
  .btn-sm { padding: 5px 12px; font-size: 0.82em; }
  .panel-tabs { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
  .panel-tab { padding: 7px 16px; border-radius: 4px; cursor: pointer; font-size: 0.9em; background: #0f3460; border: 1px solid #2a4a7f; color: #aaa; }
  .panel-tab.active { background: #e94560; border-color: #e94560; color: #fff; }
  .panel-section { display: none; }
  .panel-section.active { display: block; }
  .status-pill { display: inline-block; padding: 2px 10px; border-radius: 20px; font-size: 0.8em; font-weight: bold; }
  .status-playing { background: #14532d; color: #4ade80; }
  .status-idle { background: #3b1f00; color: #fb923c; }
  .status-stopped { background: #3b0000; color: #f87171; }
  .status-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 12px; }
  .status-card { background: #0f3460; border-radius: 6px; padding: 12px; }
  .status-card .name { font-weight: bold; margin-bottom: 6px; }
  .status-card .msg { font-size: 0.82em; color: #aaa; word-break: break-all; margin-top: 4px; }
  .toast { position: fixed; bottom: 24px; right: 24px; background: #14532d; color: #4ade80; padding: 12px 20px; border-radius: 6px; font-size: 0.9em; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 1000; }
  .toast.show { opacity: 1; }
  .toast.error { background: #7f1d1d; color: #fca5a5; }
  .override-row { display: flex; gap: 8px; margin-top: 8px; }
  .override-row input { flex: 1; }
  .row-btns { display: flex; gap: 8px; margin-top: 16px; flex-wrap: wrap; }
  .global-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; }
  .so-row { background: #0a1628; border: 1px solid #1a3060; border-radius: 4px; padding: 10px; margin-bottom: 8px; }
  .so-header { display: flex; gap: 8px; align-items: flex-end; margin-bottom: 10px; }
  .so-fields { display: grid; grid-template-columns: 1fr 1fr 90px 1fr 90px; gap: 8px; align-items: end; }
  .so-color-row { display: flex; gap: 6px; align-items: center; margin-top: 4px; }
  .so-color-row input[type=color] { width: 52px; height: 30px; padding: 2px; border-radius: 4px; border: 1px solid #2a4a7f; background: #0f3460; cursor: pointer; }
  .so-color-row input[type=color]:disabled { opacity: 0.3; cursor: not-allowed; }
  @media (max-width: 800px) { .so-fields { grid-template-columns: 1fr 1fr; } }
</style>
</head>
<body>
<div class="container">
  <h1>🎄 Matrix Scroller</h1>
  <p class="subtitle">FPP MP3 Metadata Matrix Scroller — powered by fpp-matrixtools</p>

  <!-- Status -->
  <div class="card">
    <h2>Status <button class="btn btn-secondary btn-sm" onclick="loadStatus()">↻ Refresh</button></h2>
    <div id="status-grid" class="status-grid"><p style="color:#aaa">Loading…</p></div>
  </div>

  <!-- Global Settings -->
  <div class="card">
    <h2>Global Settings</h2>
    <div class="global-grid">
      <div class="field"><label>FPP Host</label><input type="text" id="g_fpp_host" value="localhost"></div>
      <div class="field"><label>Poll Interval (seconds)</label><input type="number" id="g_poll_interval" value="1" step="0.5" min="0.5"></div>
      <div class="field"><label>No-Media Timeout (seconds)</label><input type="number" id="g_no_media_timeout" value="5" step="1" min="1"></div>
      <div class="field"><label>Matrixtools Path</label><input type="text" id="g_matrixtools_path" value="/home/fpp/media/plugins/fpp-matrixtools/scripts/matrixtools"></div>
    </div>
  </div>

  <!-- Panels -->
  <div class="card">
    <h2>Panels</h2>
    <div class="panel-tabs" id="panel-tabs"></div>
    <div id="panel-sections"></div>
    <div class="row-btns">
      <button class="btn btn-secondary" onclick="addPanel()">+ Add Panel</button>
      <button class="btn btn-danger btn-sm" onclick="removeActivePanel()">Remove Active Panel</button>
    </div>
  </div>

  <div class="row-btns">
    <button class="btn btn-primary" onclick="saveConfig()">💾 Save Config</button>
    <button class="btn btn-secondary" onclick="loadConfig()">↻ Reload from Daemon</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = '/api/plugin/matrixscroller';
let config = { global: {}, panels: [] };
let models = [];
let activePanelIdx = 0;
const songOverridesLists = {}; // panelIdx -> [{key, enabled, color, font, fontsize, position, pixelspersecond}]

// ── Toast ─────────────────────────────────────────────────────────────────────
function showToast(msg, isError = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (isError ? ' error' : '');
  setTimeout(() => t.className = 'toast', 3000);
}

// ── API helpers ───────────────────────────────────────────────────────────────
async function apiFetch(path, method = 'GET', body = null) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  const resp = await fetch(API + path, opts);
  return resp.json();
}

// ── Status ────────────────────────────────────────────────────────────────────
async function loadStatus() {
  try {
    const data = await apiFetch('/status');
    const grid = document.getElementById('status-grid');
    if (!data.panels || data.panels.length === 0) {
      grid.innerHTML = '<p style="color:#aaa">No panels configured.</p>';
      return;
    }
    grid.innerHTML = data.panels.map(p => {
      const modeLabel = p.mode === 'media' ? 'playing' : p.mode === 'no_media' ? 'idle' : p.mode || 'stopped';
      const pillClass = p.mode === 'media' ? 'status-playing' : p.mode === 'no_media' ? 'status-idle' : 'status-stopped';
      return `<div class="status-card">
        <div class="name">${escHtml(p.name || p.id)} <span class="status-pill ${pillClass}">${modeLabel}</span></div>
        <div style="font-size:0.8em;color:#888">Model: ${escHtml(p.model || '—')}</div>
        <div class="msg">${escHtml(p.message || '(no message)')}</div>
        <div class="override-row">
          <input type="text" placeholder="Override message…" id="ov_${escHtml(p.id)}">
          <button class="btn btn-secondary btn-sm" onclick="sendOverride('${escHtml(p.id)}')">Send</button>
          <button class="btn btn-secondary btn-sm" onclick="clearOverride('${escHtml(p.id)}')">Clear</button>
        </div>
      </div>`;
    }).join('');
  } catch(e) {
    document.getElementById('status-grid').innerHTML = '<p style="color:#f87171">Daemon not reachable.</p>';
  }
}

async function sendOverride(panelId) {
  const msg = document.getElementById('ov_' + panelId)?.value || '';
  await apiFetch('/message', 'POST', { panel_id: panelId, message: msg });
  showToast('Override sent');
}

async function clearOverride(panelId) {
  await apiFetch('/message', 'POST', { panel_id: panelId, message: null });
  showToast('Override cleared');
}

// ── Models ────────────────────────────────────────────────────────────────────
async function loadModels() {
  try {
    const data = await apiFetch('/models');
    models = Array.isArray(data) ? data.map(m => m.Name || m.name || m) : [];
  } catch(e) {
    models = [];
  }
}

function modelOptions(selected) {
  const base = `<option value="">-- Select Model --</option>`;
  return base + models.map(m => `<option value="${escHtml(m)}" ${m === selected ? 'selected' : ''}>${escHtml(m)}</option>`).join('');
}

// ── Config load/save ──────────────────────────────────────────────────────────
async function loadConfig() {
  try {
    const data = await apiFetch('/config');
    config = data;
    applyGlobalToUI();
    renderPanelTabs();
    showToast('Config loaded');
  } catch(e) {
    showToast('Failed to load config', true);
  }
}

function applyGlobalToUI() {
  const g = config.global || {};
  document.getElementById('g_fpp_host').value = g.fpp_host || 'localhost';
  document.getElementById('g_poll_interval').value = g.poll_interval || 1;
  document.getElementById('g_no_media_timeout').value = g.no_media_timeout || 5;
  document.getElementById('g_matrixtools_path').value = g.matrixtools_path || '/home/fpp/media/plugins/fpp-matrixtools/scripts/matrixtools';
}

function collectGlobalFromUI() {
  return {
    fpp_host: document.getElementById('g_fpp_host').value.trim(),
    poll_interval: parseFloat(document.getElementById('g_poll_interval').value) || 1,
    no_media_timeout: parseFloat(document.getElementById('g_no_media_timeout').value) || 5,
    matrixtools_path: document.getElementById('g_matrixtools_path').value.trim(),
  };
}

async function saveConfig() {
  config.global = collectGlobalFromUI();
  config.panels = collectAllPanels();
  try {
    await apiFetch('/config', 'POST', config);
    showToast('Config saved ✓');
  } catch(e) {
    showToast('Save failed', true);
  }
}

// ── Panel rendering ───────────────────────────────────────────────────────────
function escHtml(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function checkboxField(panelIdx, modeKey, fieldKey, label) {
  const chkId = `p${panelIdx}_${modeKey}_${fieldKey}_en`;
  return `<div class="checkbox-row" style="margin-bottom:6px;">
    <input type="checkbox" id="${chkId}">
    <label for="${chkId}" style="font-size:0.9em;">${label}</label>
  </div>`;
}

function textWithCheckbox(panelIdx, modeKey, fieldKey, label) {
  const chkId = `p${panelIdx}_${modeKey}_${fieldKey}_en`;
  const txtId = `p${panelIdx}_${modeKey}_${fieldKey}_txt`;
  return `<div style="margin-bottom:8px;">
    <label style="font-size:0.8em;color:#aaa;text-transform:uppercase;letter-spacing:0.05em;">${label}</label>
    <div class="text-field-row" style="margin-top:4px;">
      <input type="checkbox" id="${chkId}" title="Enable">
      <input type="text" id="${txtId}" placeholder="${label}…">
    </div>
  </div>`;
}

function renderPanel(panelIdx, pcfg) {
  const id = `panel-section-${panelIdx}`;
  const model_sel = `p${panelIdx}_model`;
  const mediaFields = [
    textWithCheckbox(panelIdx, 'media', 'pre_roll', 'Pre-Roll'),
    textWithCheckbox(panelIdx, 'media', 'tune_to',  'Tune To'),
    `<div class="section-label" style="margin-top:10px;">Metadata Fields</div>`,
    checkboxField(panelIdx, 'media', 'artist', 'Artist'),
    checkboxField(panelIdx, 'media', 'title',  'Title'),
    checkboxField(panelIdx, 'media', 'album',  'Album'),
    textWithCheckbox(panelIdx, 'media', 'post_roll', 'Post-Roll'),
    textWithCheckbox(panelIdx, 'media', 'gap',       'Gap Char'),
  ].join('');
  const nomediaFields = [
    textWithCheckbox(panelIdx, 'no_media', 'pre_roll', 'Pre-Roll'),
    textWithCheckbox(panelIdx, 'no_media', 'tune_to',  'Tune To'),
    textWithCheckbox(panelIdx, 'no_media', 'post_roll', 'Post-Roll'),
    textWithCheckbox(panelIdx, 'no_media', 'gap',       'Gap Char'),
  ].join('');

  return `<div class="panel-section" id="${id}">
    <div class="checkbox-row" style="margin-bottom:12px;">
      <input type="checkbox" id="p${panelIdx}_enabled">
      <label for="p${panelIdx}_enabled">Panel Enabled</label>
    </div>
    <div class="grid2" style="margin-bottom:12px;">
      <div class="field"><label>Panel Name</label><input type="text" id="p${panelIdx}_name"></div>
      <div class="field"><label>Panel ID</label><input type="text" id="p${panelIdx}_id"></div>
    </div>

    <div class="section-label">Matrix / Display</div>
    <div class="grid2">
      <div class="field"><label>Model (Pixel Overlay)</label>
        <select id="${model_sel}">${modelOptions(pcfg.model || '')}</select>
      </div>
      <div class="field"><label>Color</label><input type="color" id="p${panelIdx}_color"></div>
      <div class="field"><label>Font</label><input type="text" id="p${panelIdx}_font" placeholder="Helvetica"></div>
      <div class="field"><label>Font Size</label><input type="number" id="p${panelIdx}_fontsize" min="4" max="72"></div>
      <div class="field"><label>Position / Direction</label>
        <select id="p${panelIdx}_position">
          <option value="R2L">R2L – Right to Left (scroll)</option>
          <option value="L2R">L2R – Left to Right (scroll)</option>
          <option value="B2T">B2T – Bottom to Top (scroll)</option>
          <option value="T2B">T2B – Top to Bottom (scroll)</option>
          <option value="center">Center (static)</option>
        </select>
      </div>
      <div class="field"><label>Pixels Per Second</label><input type="number" id="p${panelIdx}_pps" min="1" max="200"></div>
    </div>

    <div class="section-label">Message Fields</div>
    <div class="mode-cols">
      <div class="mode-col">
        <div class="mode-col-header">
          <input type="checkbox" id="p${panelIdx}_media_enabled">
          <label for="p${panelIdx}_media_enabled">🎵 When Media Playing — Enabled</label>
        </div>
        ${mediaFields}
      </div>
      <div class="mode-col">
        <div class="mode-col-header">
          <input type="checkbox" id="p${panelIdx}_no_media_enabled">
          <label for="p${panelIdx}_no_media_enabled">⏸ When No Media — Enabled</label>
        </div>
        ${nomediaFields}
      </div>
    </div>

    <div class="section-label" style="margin-top:18px;">Per-Song Overrides</div>
    <p style="font-size:0.8em;color:#888;margin:0 0 10px;">Override display params when a specific song is playing. Key matches mp3 filename (with or without extension, case-insensitive). Leave color/font/size/etc. blank to inherit panel defaults.</p>
    <div id="p${panelIdx}_so_list"></div>
    <button class="btn btn-secondary btn-sm" onclick="addSongOverride(${panelIdx})">+ Add Song Override</button>
  </div>`;
}

function renderPanelTabs() {
  const tabs = document.getElementById('panel-tabs');
  const sections = document.getElementById('panel-sections');
  const panels = config.panels || [];
  Object.keys(songOverridesLists).forEach(k => delete songOverridesLists[k]);

  tabs.innerHTML = panels.map((p, i) =>
    `<div class="panel-tab ${i === activePanelIdx ? 'active' : ''}" onclick="switchPanel(${i})">${escHtml(p.name || ('Panel ' + (i+1)))}</div>`
  ).join('');

  sections.innerHTML = panels.map((p, i) => renderPanel(i, p)).join('');

  panels.forEach((p, i) => applyPanelToUI(i, p));
  switchPanel(Math.min(activePanelIdx, panels.length - 1));
}

function applyPanelToUI(idx, pcfg) {
  const get = id => document.getElementById(id);
  get(`p${idx}_enabled`).checked   = pcfg.enabled !== false;
  get(`p${idx}_name`).value        = pcfg.name    || '';
  get(`p${idx}_id`).value          = pcfg.id      || '';
  get(`p${idx}_color`).value       = pcfg.color   || '#ff0000';
  get(`p${idx}_font`).value        = pcfg.font    || 'Helvetica';
  get(`p${idx}_fontsize`).value    = pcfg.fontsize || 10;
  const posSel = get(`p${idx}_position`);
  if (posSel) posSel.value         = pcfg.position || 'R2L';
  get(`p${idx}_pps`).value         = pcfg.pixelspersecond || 15;

  const mSel = get(`p${idx}_model`);
  if (mSel) mSel.innerHTML = modelOptions(pcfg.model || '');

  ['media','no_media'].forEach(mode => {
    // Mode-level enable
    const modeEnEl = get(`p${idx}_${mode}_enabled`);
    if (modeEnEl) modeEnEl.checked = (pcfg[mode] || {}).enabled !== false;

    // Per-field enable + text
    ['pre_roll','tune_to','post_roll','gap'].forEach(field => {
      const fCfg = (pcfg[mode] || {})[field] || {};
      const enEl  = get(`p${idx}_${mode}_${field}_en`);
      const txtEl = get(`p${idx}_${mode}_${field}_txt`);
      if (enEl)  enEl.checked = fCfg.enabled || false;
      if (txtEl) txtEl.value  = fCfg.text    || '';
    });
  });

  // Metadata toggles — media mode only
  const mediaCfg = pcfg.media || {};
  const metaDefaults = { artist: true, title: true, album: false };
  ['artist','title','album'].forEach(field => {
    const enEl = get(`p${idx}_media_${field}_en`);
    if (enEl) enEl.checked = (mediaCfg[field] || {}).enabled ?? metaDefaults[field];
  });

  // Song overrides
  applySongOverridesToUI(idx, pcfg.song_overrides || {});
}

function collectPanel(idx) {
  const get = id => document.getElementById(id);
  const panel = {
    id:      get(`p${idx}_id`).value.trim()   || `panel_${idx+1}`,
    name:    get(`p${idx}_name`).value.trim() || `Panel ${idx+1}`,
    enabled: get(`p${idx}_enabled`).checked,
    model:   get(`p${idx}_model`)?.value || '',
    color:   get(`p${idx}_color`).value.trim()  || '#ff0000',
    font:    get(`p${idx}_font`).value.trim()   || 'Helvetica',
    fontsize: parseInt(get(`p${idx}_fontsize`).value) || 10,
    position: get(`p${idx}_position`)?.value || 'R2L',
    pixelspersecond: parseInt(get(`p${idx}_pps`).value) || 15,
    media:    {},
    no_media: {},
  };
  ['media','no_media'].forEach(mode => {
    panel[mode].enabled = get(`p${idx}_${mode}_enabled`)?.checked ?? true;
    ['pre_roll','tune_to','post_roll','gap'].forEach(field => {
      panel[mode][field] = {
        enabled: get(`p${idx}_${mode}_${field}_en`)?.checked  || false,
        text:    get(`p${idx}_${mode}_${field}_txt`)?.value   || '',
      };
    });
  });

  // Metadata toggles — media mode only
  const metaDefaults = { artist: true, title: true, album: false };
  ['artist','title','album'].forEach(field => {
    panel.media[field] = {
      enabled: get(`p${idx}_media_${field}_en`)?.checked ?? metaDefaults[field],
    };
  });

  // Song overrides
  panel.song_overrides = collectSongOverrides(idx);

  return panel;
}

function collectAllPanels() {
  return (config.panels || []).map((_, i) => collectPanel(i));
}

function switchPanel(idx) {
  activePanelIdx = idx;
  document.querySelectorAll('.panel-tab').forEach((t, i) => t.classList.toggle('active', i === idx));
  document.querySelectorAll('.panel-section').forEach((s, i) => s.classList.toggle('active', i === idx));
}

function addPanel() {
  const newIdx = (config.panels || []).length;
  const newPanel = {
    id: `panel_${newIdx + 1}`,
    name: `Panel ${newIdx + 1}`,
    enabled: true,
    model: '',
    color: '#ff0000',
    font: 'Helvetica',
    fontsize: 10,
    position: 'R2L',
    pixelspersecond: 15,
    media:    { enabled: true,  pre_roll:{enabled:false,text:''}, tune_to:{enabled:false,text:'Tune To:'}, artist:{enabled:true}, title:{enabled:true}, album:{enabled:false}, post_roll:{enabled:false,text:''}, gap:{enabled:true,text:' | '} },
    no_media: { enabled: true,  pre_roll:{enabled:false,text:''}, tune_to:{enabled:true, text:'Tune To:'}, post_roll:{enabled:false,text:''}, gap:{enabled:true,text:' | '} },
    song_overrides: {},
  };
  config.panels = collectAllPanels();
  config.panels.push(newPanel);
  activePanelIdx = config.panels.length - 1;
  renderPanelTabs();
}

function removeActivePanel() {
  if ((config.panels || []).length <= 1) { showToast('Must have at least one panel', true); return; }
  config.panels = collectAllPanels();
  config.panels.splice(activePanelIdx, 1);
  activePanelIdx = Math.max(0, activePanelIdx - 1);
  renderPanelTabs();
  showToast('Panel removed');
}

// ── Song overrides ────────────────────────────────────────────────────────────

function toggleSoColor(cb, pfx) {
  const picker = document.getElementById(`${pfx}_color`);
  if (picker) picker.disabled = !cb.checked;
}

function soPositionOptions(selected) {
  const opts = ['', 'R2L', 'L2R', 'B2T', 'T2B', 'center'];
  const labels = { '': '— inherit from panel —', R2L: 'R2L', L2R: 'L2R', B2T: 'B2T', T2B: 'T2B', center: 'Center' };
  return opts.map(v => `<option value="${v}" ${v === (selected || '') ? 'selected' : ''}>${labels[v]}</option>`).join('');
}

function renderSongOverrideRow(panelIdx, i, ov) {
  const pfx = `p${panelIdx}_so_${i}`;
  const fontsize = (ov.fontsize != null && ov.fontsize !== '') ? ov.fontsize : '';
  const pps = (ov.pixelspersecond != null && ov.pixelspersecond !== '') ? ov.pixelspersecond : '';
  return `<div class="so-row">
    <div class="so-header">
      <div style="flex:1;">
        <label style="font-size:0.8em;color:#aaa;text-transform:uppercase;letter-spacing:0.05em;">MP3 Filename (key)</label>
        <input type="text" id="${pfx}_key" placeholder="song_name.mp3 or song_name" value="${escHtml(ov.key || '')}">
      </div>
      <div class="checkbox-row" style="margin-bottom:0;flex-shrink:0;">
        <input type="checkbox" id="${pfx}_enabled" ${ov.enabled !== false ? 'checked' : ''}>
        <label for="${pfx}_enabled" style="white-space:nowrap;">Enabled</label>
      </div>
      <button class="btn btn-danger btn-sm" onclick="removeSongOverride(${panelIdx}, ${i})">✕ Remove</button>
    </div>
    <div class="so-fields">
      <div class="field"><label>Color</label>
        <div class="so-color-row">
          <input type="checkbox" id="${pfx}_color_en" style="width:16px;height:16px;accent-color:#e94560;cursor:pointer;flex-shrink:0;" ${ov.color ? 'checked' : ''} onchange="toggleSoColor(this,'${pfx}')">
          <input type="color" id="${pfx}_color" value="${escHtml(ov.color || '#ff0000')}" ${ov.color ? '' : 'disabled'}>
        </div>
      </div>
      <div class="field"><label>Font</label><input type="text" id="${pfx}_font" placeholder="inherit" value="${escHtml(ov.font || '')}"></div>
      <div class="field"><label>Font Size</label><input type="number" id="${pfx}_fontsize" placeholder="inherit" min="4" max="72" value="${fontsize}"></div>
      <div class="field"><label>Position</label><select id="${pfx}_position">${soPositionOptions(ov.position)}</select></div>
      <div class="field"><label>Pixels/Sec</label><input type="number" id="${pfx}_pps" placeholder="inherit" min="1" max="200" value="${pps}"></div>
    </div>
  </div>`;
}

function renderSongOverrides(panelIdx) {
  const container = document.getElementById(`p${panelIdx}_so_list`);
  if (!container) return;
  const list = songOverridesLists[panelIdx] || [];
  if (list.length === 0) {
    container.innerHTML = '<p style="color:#555;font-size:0.82em;margin:6px 0 10px;">No song overrides configured.</p>';
    return;
  }
  container.innerHTML = list.map((ov, i) => renderSongOverrideRow(panelIdx, i, ov)).join('');
}

function syncSongOverridesFromDOM(panelIdx) {
  const container = document.getElementById(`p${panelIdx}_so_list`);
  if (!container) return;
  const rows = container.querySelectorAll('.so-row');
  const list = [];
  rows.forEach((_, i) => {
    const pfx = `p${panelIdx}_so_${i}`;
    const fontsize = parseInt(document.getElementById(`${pfx}_fontsize`)?.value);
    const pps = parseInt(document.getElementById(`${pfx}_pps`)?.value);
    list.push({
      key:            document.getElementById(`${pfx}_key`)?.value      || '',
      enabled:        document.getElementById(`${pfx}_enabled`)?.checked ?? true,
      color:          document.getElementById(`${pfx}_color_en`)?.checked ? (document.getElementById(`${pfx}_color`)?.value || '') : '',
      font:           document.getElementById(`${pfx}_font`)?.value      || '',
      fontsize:       isNaN(fontsize) ? '' : fontsize,
      position:       document.getElementById(`${pfx}_position`)?.value  || '',
      pixelspersecond: isNaN(pps) ? '' : pps,
    });
  });
  songOverridesLists[panelIdx] = list;
}

function addSongOverride(panelIdx) {
  syncSongOverridesFromDOM(panelIdx);
  if (!songOverridesLists[panelIdx]) songOverridesLists[panelIdx] = [];
  songOverridesLists[panelIdx].push({ key: '', enabled: true, color: '', font: '', fontsize: '', position: '', pixelspersecond: '' });
  renderSongOverrides(panelIdx);
}

function removeSongOverride(panelIdx, i) {
  syncSongOverridesFromDOM(panelIdx);
  if (songOverridesLists[panelIdx]) songOverridesLists[panelIdx].splice(i, 1);
  renderSongOverrides(panelIdx);
}

function applySongOverridesToUI(panelIdx, overridesDict) {
  songOverridesLists[panelIdx] = Object.entries(overridesDict || {}).map(([key, ov]) => ({ key, ...ov }));
  renderSongOverrides(panelIdx);
}

function collectSongOverrides(panelIdx) {
  const container = document.getElementById(`p${panelIdx}_so_list`);
  if (!container) return {};
  const rows = container.querySelectorAll('.so-row');
  const result = {};
  rows.forEach((_, i) => {
    const pfx = `p${panelIdx}_so_${i}`;
    const key = (document.getElementById(`${pfx}_key`)?.value || '').trim();
    if (!key) return;
    const ov = { enabled: document.getElementById(`${pfx}_enabled`)?.checked ?? true };
    const colorEnabled = document.getElementById(`${pfx}_color_en`)?.checked;
    const colorVal = (document.getElementById(`${pfx}_color`)?.value || '').trim();
    if (colorEnabled && colorVal) ov.color = colorVal;
    const font = (document.getElementById(`${pfx}_font`)?.value || '').trim();
    if (font) ov.font = font;
    const fontsize = parseInt(document.getElementById(`${pfx}_fontsize`)?.value);
    if (!isNaN(fontsize) && fontsize > 0) ov.fontsize = fontsize;
    const pos = document.getElementById(`${pfx}_position`)?.value || '';
    if (pos) ov.position = pos;
    const pps = parseInt(document.getElementById(`${pfx}_pps`)?.value);
    if (!isNaN(pps) && pps > 0) ov.pixelspersecond = pps;
    result[key] = ov;
  });
  return result;
}

// ── Init ──────────────────────────────────────────────────────────────────────
async function init() {
  await loadModels();
  await loadConfig();
  await loadStatus();
  setInterval(loadStatus, 10000);
}

init();
</script>
</body>
</html>
